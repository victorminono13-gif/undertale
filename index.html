<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULB: Sans vs Frisk - Online</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        #gameCanvas {
            border: 4px solid #fff;
            background-color: #000;
            image-rendering: pixelated; /* Mantém a vibe retro/pixel art */
            margin-top: 20px;
        }
        .ui-panel {
            border: 2px solid #fff;
            padding: 15px;
            margin-bottom: 20px;
            width: 600px;
        }
        button, input {
            background: #000;
            color: #fff;
            border: 1px solid #fff;
            padding: 5px 10px;
            font-family: inherit;
            cursor: pointer;
        }
        button:hover { background: #fff; color: #000; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div class="ui-panel">
        <h2>Painel de Conexão (P2P)</h2>
        <p>Seu ID: <span id="my-id" style="color: #ffff00;">Gerando...</span></p>
        
        <div>
            <label>Conectar ao ID do amigo:</label>
            <input type="text" id="friend-id" placeholder="Cole o ID aqui">
            <button onclick="connectToPeer()">Conectar (Jogar como Frisk)</button>
        </div>
        <p id="status" style="color: #00ff00; margin-top: 10px;">Status: Aguardando conexão...</p>
    </div>

    <canvas id="gameCanvas" width="640" height="480"></canvas>

    <script src="game.js"></script>
</body>
</html>
