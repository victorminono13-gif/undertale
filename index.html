<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undertale: Multiplayer Battle System V0.4</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #FFFFFF;
            --border-color: #FFFFFF;
            --highlight-color: #FFFF00;
            --hp-green: #00FF00;
            --sans-blue: #00FFFF;
            --miss-gray: #CCCCCC;
        }

        * {
            box-sizing: border-box;
            image-rendering: pixelated; /* Força renderização 100% pixel art */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Press Start 2P', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            overflow-x: hidden;
        }

        /* --- ANIMAÇÃO DO SANS --- */
        @keyframes sansHead {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-3px) rotate(-1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes sansBody {
            0% { transform: translateY(0px) scaleY(1); }
            50% { transform: translateY(-4px) scaleY(1.03); }
            100% { transform: translateY(0px) scaleY(1); }
        }

        @keyframes sansArms {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-2px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .sans-container {
            position: relative;
            width: 140px;
            height: 150px;
            margin: 0 auto 10px auto;
            transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .sans-dodging {
            transform: translateX(-130px) !important;
        }

        .sans-part {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .sans-legs {
            bottom: 0;
            width: 64px;
            z-index: 1;
        }

        .sans-body {
            bottom: 24px;
            width: 80px;
            z-index: 3;
            animation: sansBody 3s ease-in-out infinite;
        }

        .sans-arm-left {
            bottom: 28px;
            left: 15px;
            width: 28px;
            z-index: 2;
            transform-origin: top right;
            animation: sansArms 3s ease-in-out infinite 0.2s;
        }

        .sans-arm-right {
            bottom: 28px;
            right: 15px;
            left: auto;
            width: 28px;
            z-index: 2;
            transform-origin: top left;
            animation: sansArms 3s ease-in-out infinite 0.4s;
        }

        .sans-head {
            bottom: 64px;
            width: 64px;
            z-index: 4;
            animation: sansHead 3s ease-in-out infinite 0.1s;
        }

        /* --- EFEITO MISS --- */
        #miss-popup {
            position: absolute;
            top: 10px;
            right: -60px;
            color: var(--miss-gray);
            font-size: 22px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            opacity: 0;
            transition: all 0.4s ease-out;
            pointer-events: none;
            z-index: 10;
        }

        .show-miss {
            opacity: 1 !important;
            transform: translateY(-35px);
        }

        /* --- TELA 1: LOBBY --- */
        #lobby-screen {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .menu-box {
            border: 4px solid var(--border-color);
            padding: 30px;
            width: 100%;
            background-color: black;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 16px;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 10px;
            margin-bottom: 8px;
            color: var(--highlight-color);
        }

        select, button {
            background-color: black;
            color: white;
            border: 2px solid white;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            padding: 12px;
            cursor: pointer;
            outline: none;
        }

        select:focus, button:hover {
            border-color: var(--highlight-color);
            color: var(--highlight-color);
        }

        .soul-preview-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 45px;
            margin: 10px 0;
        }

        .pixel-soul-img {
            width: 24px;
            height: 24px;
            transition: transform 0.3s ease;
        }

        .monster-soul {
            transform: rotate(180deg);
        }

        .btn-ready {
            width: 100%;
            font-size: 14px;
            padding: 15px;
            margin-top: 10px;
        }

        .btn-ready.ready-active {
            background-color: #008000;
            border-color: #00FF00;
            color: white;
        }

        /* --- TELA 2: ARENA DE BATALHA --- */
        #battle-screen {
            display: none;
            width: 100%;
            max-width: 650px;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 550px;
        }

        .battle-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            position: relative;
            margin-top: 20px;
        }

        .battle-box {
            border: 4px solid white;
            width: 100%;
            height: 180px;
            background-color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: 15px 0;
            overflow: hidden;
            padding: 20px;
        }

        .battle-text {
            font-size: 13px;
            line-height: 1.8;
            width: 100%;
            text-align: left;
            align-self: flex-start;
        }

        /* --- QUICK TIME EVENT (QTE) --- */
        #qte-container {
            display: none;
            width: 90%;
            height: 110px;
            border: 2px solid #555;
            background: url('Ataque/bg.png') center/cover no-repeat;
            background-color: #111;
            position: relative;
            align-items: center;
            justify-content: center;
        }

        .qte-target-center {
            position: absolute;
            width: 14px;
            height: 100%;
            background-color: rgba(255, 255, 0, 0.4);
            border-left: 2px solid yellow;
            border-right: 2px solid yellow;
            left: calc(50% - 7px);
        }

        .qte-bar {
            position: absolute;
            width: 10px;
            height: 95%;
            background-color: white;
            border: 1px solid black;
            left: 0%;
            box-shadow: 0 0 8px white;
        }

        @keyframes qteSlide {
            0% { left: 2%; }
            100% { left: 95%; }
        }

        .qte-animating {
            animation: qteSlide 1.1s infinite alternate linear;
        }

        /* --- CONTROLES GM DO SANS (+ / -) --- */
        #sans-gm-controls {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            border: 2px dashed var(--sans-blue);
            padding: 12px;
            background-color: rgba(0, 255, 255, 0.05);
            margin-top: 5px;
        }

        .sans-btn-group {
            display: flex;
            gap: 15px;
            margin-top: 8px;
        }

        .sans-btn {
            border-color: var(--sans-blue);
            color: var(--sans-blue);
            padding: 8px 12px;
            font-size: 10px;
        }

        .sans-btn:hover {
            background-color: var(--sans-blue);
            color: black;
        }

        /* --- BOTÕES DE OPÇÃO EM SPRITE --- */
        .battle-actions {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 10px;
        }

        .action-btn-sprite {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            outline: none;
        }

        .action-btn-sprite img {
            width: 100%;
            max-width: 140px;
            height: auto;
            display: block;
            transition: transform 0.1s;
        }

        .action-btn-sprite:hover img,
        .action-btn-sprite.selected img {
            transform: scale(1.05);
        }

        .action-btn-sprite:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .vote-badge {
            font-size: 8px;
            background-color: #FF8000;
            color: black;
            padding: 2px 5px;
            margin-top: 4px;
            font-weight: bold;
        }

        .action-btn-sprite.selected .vote-badge {
            background-color: var(--highlight-color);
        }

        .sim-btn {
            margin-top: 15px;
            font-size: 9px;
            border-color: #555;
            color: #AAA;
        }

        .heal-text {
            color: var(--hp-green);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- ================= TELA 1: LOBBY ================= -->
    <div id="lobby-screen">
        <div class="sans-container">
            <img src="Sans textura/legs-normal.png" alt="" class="sans-part sans-legs">
            <img src="Sans textura/arm-left.png" alt="" class="sans-part sans-arm-left">
            <img src="Sans textura/arm-right.png" alt="" class="sans-part sans-arm-right">
            <img src="Sans textura/body-normal.png" alt="" class="sans-part sans-body">
            <img src="Sans textura/head-normal.png" alt="" class="sans-part sans-head">
        </div>

        <div class="menu-box">
            <h1>LOBBY MULTIPLAYER</h1>

            <div class="form-group">
                <label for="player-count">* TOTAL DE JOGADORES</label>
                <select id="player-count">
                    <option value="2">2 JOGADORES (SANS + 1 ALMA)</option>
                    <option value="3">3 JOGADORES (SANS + 2 ALMAS)</option>
                    <option value="4">4 JOGADORES (SANS + 3 ALMAS)</option>
                    <option value="5">5 JOGADORES (SANS + 4 ALMAS)</option>
                    <option value="6">6 JOGADORES (SANS + 5 ALMAS)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="role-select">* ESCOLHA SEU SLOT</label>
                <select id="role-select" onchange="updateMenuState()">
                    <option value="sans">JOGADOR 1: SANS (INIMIGO / GM)</option>
                    <option value="soul1" selected>JOGADOR 2: ALMA 1</option>
                    <option value="soul2">JOGADOR 3: ALMA 2</option>
                    <option value="soul3">JOGADOR 4: ALMA 3</option>
                    <option value="soul4">JOGADOR 5: ALMA 4</option>
                    <option value="soul5">JOGADOR 6: ALMA 5</option>
                </select>
            </div>

            <div class="form-group">
                <label for="soul-color">* COR DA SUA ALMA</label>
                <select id="soul-color" onchange="updateSoulPreview()">
                    <option value="red">VERMELHA (DETERMINAÇÃO)</option>
                    <option value="blue">AZUL (INTEGRIDADE)</option>
                    <option value="green">VERDE (BONDADE)</option>
                    <option value="yellow">AMARELA (JUSTIÇA)</option>
                    <option value="purple">ROXA (PERSEVERANÇA)</option>
                    <option value="cyan">CIANO (PACIÊNCIA)</option>
                    <option value="orange">LARANJA (BRAVURA)</option>
                    <option value="white">BRANCA (MONSTRO)</option>
                </select>
            </div>

            <div class="form-group" id="monster-toggle-group">
                <label for="is-monster">* ORIENTAÇÃO DA ALMA</label>
                <select id="is-monster" onchange="updateSoulPreview()">
                    <option value="human">HUMANA (NORMAL)</option>
                    <option value="monster">MONSTRO (CABEÇA PARA BAIXO)</option>
                </select>
            </div>

            <div class="soul-preview-container" id="soul-display-container">
                <img src="Alma do jogador/soul.png" alt="Soul" class="pixel-soul-img" id="soul-img">
            </div>

            <button class="btn-ready" id="btn-ready" onclick="toggleReady()">APERTAR PRONTO</button>
        </div>
    </div>

    <!-- ================= TELA 2: ARENA DE BATALHA ================= -->
    <div id="battle-screen">
        <div class="battle-top">
            <!-- Skin modular do Sans de Batalha -->
            <div class="sans-container" id="sans-battle-sprite">
                <img src="Sans textura/legs-normal.png" alt="" class="sans-part sans-legs">
                <img src="Sans textura/arm-left.png" alt="" class="sans-part sans-arm-left">
                <img src="Sans textura/arm-right.png" alt="" class="sans-part sans-arm-right">
                <img src="Sans textura/body-normal.png" alt="" class="sans-part sans-body">
                <img src="Sans textura/head-normal.png" alt="" class="sans-part sans-head">
                <div id="miss-popup">MISS</div>
            </div>
            <p style="font-size: 11px; margin-top: 5px; color: white; letter-spacing: 3px;">SANS</p>
        </div>

        <div class="battle-box">
            <div class="battle-text" id="battle-text">
                * Votação iniciada! O que as Almas irão fazer?<br>
                * Escolha uma opção abaixo.
            </div>

            <div id="qte-container">
                <div class="qte-target-center"></div>
                <div class="qte-bar qte-animating" id="qte-bar"></div>
            </div>
        </div>

        <!-- PAINEL GM DO SANS -->
        <div id="sans-gm-controls">
            <span style="color: var(--sans-blue); font-size: 11px;">* CONTROLE DE TURNO DO SANS (ATALHO: TECLAS + E -)</span>
            <div class="sans-btn-group">
                <button class="sans-btn" onclick="adjustSansTime(-2)">[ - ] DIMINUIR (-2s)</button>
                <button class="sans-btn" onclick="adjustSansTime(2)">[ + ] AUMENTAR (+2s)</button>
            </div>
        </div>

        <!-- BOTÕES EM SPRITES ORIGINAIS -->
        <div class="battle-actions">
            <button class="action-btn-sprite" id="btn-fight" onclick="castVote('LUTAR')">
                <img src="Hud de ações/f0.png" alt="LUTAR" id="img-LUTAR">
                <span class="vote-badge" id="badge-LUTAR">0 VOTOS</span>
            </button>
            <button class="action-btn-sprite" id="btn-act" onclick="castVote('AGIR')">
                <img src="Hud de ações/All.png" alt="AGIR" id="img-AGIR">
                <span class="vote-badge" id="badge-AGIR">0 VOTOS</span>
            </button>
            <button class="action-btn-sprite" id="btn-item" onclick="castVote('ITEM')">
                <img src="Hud de ações/All.png" alt="ITEM" id="img-ITEM">
                <span class="vote-badge" id="badge-ITEM">0 VOTOS</span>
            </button>
            <button class="action-btn-sprite" id="btn-mercy" onclick="castVote('POUPAR')">
                <img src="Hud de ações/All.png" alt="POUPAR" id="img-POUPAR">
                <span class="vote-badge" id="badge-POUPAR">0 VOTOS</span>
            </button>
        </div>

        <button class="sim-btn" id="btn-sim" onclick="simulateNetworkVotes()">[ TESTE OFFLINE ] SIMULAR VOTOS DAS OUTRAS ALMAS</button>
    </div>

    <script>
        /* ================= ESTADOS DO SISTEMA ================= */
        let playerState = {
            role: 'soul1',
            color: 'red',
            isMonster: false,
            isReady: false
        };

        let gameState = {
            phase: 'VOTING', // 'VOTING', 'QTE', 'RESOLVING_ITEM', 'SANS_TURN'
            votes: { 'LUTAR': 0, 'AGIR': 0, 'ITEM': 0, 'POUPAR': 0 },
            hasVoted: false,
            sansTurnTimer: 10,
            timerInterval: null
        };

        const soulFilters = {
            'red': 'none',
            'blue': 'hue-rotate(240deg) saturate(3)',
            'green': 'hue-rotate(120deg) saturate(3)',
            'yellow': 'hue-rotate(60deg) brightness(1.5)',
            'purple': 'hue-rotate(280deg) saturate(2)',
            'cyan': 'hue-rotate(180deg) brightness(1.5)',
            'orange': 'hue-rotate(30deg) saturate(3)',
            'white': 'grayscale(100%) brightness(3)'
        };

        // Mapeamento corrigido baseado no nome das pastas originais
        const spriteMap = {
            'LUTAR': { normal: 'Hud de ações/f0.png', active: 'Hud de ações/f1.png' },
            'AGIR':  { normal: 'Hud de ações/All.png', active: 'Hud de ações/All.png' },
            'ITEM':  { normal: 'Hud de ações/All.png', active: 'Hud de ações/i1.png' },
            'POUPAR':{ normal: 'Hud de ações/All.png', active: 'Hud de ações/All.png' }
        };

        /* ================= CONTROLE DE TECLADO (+ e - DO SANS) ================= */
        window.addEventListener('keydown', (e) => {
            if (playerState.role === 'sans' && gameState.phase === 'SANS_TURN') {
                if (e.key === '+' || e.key === '=' || e.code === 'NumpadAdd') {
                    adjustSansTime(2);
                } else if (e.key === '-' || e.key === '_' || e.code === 'NumpadSubtract') {
                    adjustSansTime(-2);
                }
            }

            if (gameState.phase === 'QTE' && (e.code === 'Space' || e.code === 'KeyZ')) {
                triggerAttackStrike();
            }
        });

        /* ================= LOBBY ================= */
        function updateMenuState() {
            const role = document.getElementById('role-select').value;
            const colorSelect = document.getElementById('soul-color');
            const monsterSelect = document.getElementById('is-monster');
            const soulContainer = document.getElementById('soul-display-container');
            
            playerState.role = role;

            if (role === 'sans') {
                colorSelect.disabled = true;
                monsterSelect.disabled = true;
                soulContainer.style.visibility = "hidden";
            } else {
                colorSelect.disabled = false;
                monsterSelect.disabled = false;
                soulContainer.style.visibility = "visible";
                updateSoulPreview();
            }
            
            if (playerState.isReady) toggleReady(); 
        }

        function updateSoulPreview() {
            if (playerState.role === 'sans') return;

            const color = document.getElementById('soul-color').value;
            const type = document.getElementById('is-monster').value;
            const soulImg = document.getElementById('soul-img');

            playerState.color = color;
            playerState.isMonster = (type === 'monster');

            soulImg.style.filter = soulFilters[color] || 'none';

            if (playerState.isMonster) soulImg.classList.add('monster-soul');
            else soulImg.classList.remove('monster-soul');
        }

        function toggleReady() {
            const btn = document.getElementById('btn-ready');
            playerState.isReady = !playerState.isReady;

            if (playerState.isReady) {
                btn.classList.add('ready-active');
                btn.innerText = "* PRONTO! INICIANDO...";
                // Som de seleção ao confirmar
                let audio = new Audio('Sons do menu/snd_select.wav');
                audio.play().catch(()=>{});

                setTimeout(() => startBattle(), 800);
            } else {
                btn.classList.remove('ready-active');
                btn.innerText = "APERTAR PRONTO";
            }
        }

        function startBattle() {
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('battle-screen').style.display = 'flex';
            startVotingPhase();
        }

        /* ================= SISTEMA DE VOTAÇÃO ================= */
        function startVotingPhase() {
            gameState.phase = 'VOTING';
            gameState.hasVoted = false;
            gameState.votes = { 'LUTAR': 0, 'AGIR': 0, 'ITEM': 0, 'POUPAR': 0 };

            document.getElementById('qte-container').style.display = 'none';
            document.getElementById('sans-gm-controls').style.display = 'none';
            document.getElementById('battle-text').style.display = 'block';
            document.getElementById('btn-sim').style.display = 'block';
            
            const buttons = document.querySelectorAll('.action-btn-sprite');
            buttons.forEach(btn => {
                btn.disabled = false;
                btn.classList.remove('selected');
            });

            for (let act in spriteMap) {
                document.getElementById(`img-${act}`).src = spriteMap[act].normal;
            }

            updateVoteDisplay();

            if (playerState.role === 'sans') {
                document.getElementById('battle-text').innerHTML = `* Você é o <span style="color:cyan">SANS</span>.<br>* Aguarde as Almas votarem em uma ação...`;
                buttons.forEach(btn => btn.disabled = true);
            } else {
                document.getElementById('battle-text').innerHTML = `* Votação de Turno! O que sua Alma fará?<br>* Clique em um dos botões abaixo para votar.`;
            }
        }

        function castVote(action) {
            if (gameState.hasVoted || playerState.role === 'sans') return;
            
            gameState.hasVoted = true;
            gameState.votes[action]++;
            
            // Som de escolha
            let audio = new Audio('Hud de ações/snd_select.wav');
            audio.play().catch(()=>{});

            document.querySelectorAll('.action-btn-sprite').forEach(btn => {
                btn.classList.remove('selected');
            });
            for (let act in spriteMap) {
                document.getElementById(`img-${act}`).src = spriteMap[act].normal;
            }

            event.currentTarget.classList.add('selected');
            document.getElementById(`img-${action}`).src = spriteMap[action].active;

            updateVoteDisplay();
            document.getElementById('battle-text').innerHTML = `* Você selecionou <span style="color:yellow">${action}</span>.<br>* Aguardando o voto dos outros...`;
            
            checkVotingComplete();
        }

        function updateVoteDisplay() {
            for (let act in gameState.votes) {
                document.getElementById(`badge-${act}`).innerText = `${gameState.votes[act]} VOTOS`;
            }
        }

        function simulateNetworkVotes() {
            const actions = ['LUTAR', 'LUTAR', 'ITEM', 'AGIR', 'POUPAR'];
            for(let i=0; i<3; i++) {
                const randomAct = actions[Math.floor(Math.random() * actions.length)];
                gameState.votes[randomAct]++;
            }
            updateVoteDisplay();
            checkVotingComplete();
        }

        function checkVotingComplete() {
            let totalVotes = Object.values(gameState.votes).reduce((a, b) => a + b, 0);
            
            if (totalVotes >= 2) {
                document.getElementById('btn-sim').style.display = 'none';
                let winner = Object.keys(gameState.votes).reduce((a, b) => gameState.votes[a] > gameState.votes[b] ? a : b);
                
                for (let act in spriteMap) {
                    document.getElementById(`img-${act}`).src = (act === winner) ? spriteMap[act].active : spriteMap[act].normal;
                }

                document.getElementById('battle-text').innerHTML = `* A ação vencedora das Almas foi: <span style="color:yellow">${winner}</span>!`;
                
                setTimeout(() => {
                    if (winner === 'LUTAR') {
                        startQTEPhase();
                    } else if (winner === 'ITEM') {
                        resolveItemAction();
                    } else {
                        document.getElementById('battle-text').innerHTML = `* Vocês tentam ${winner.toLowerCase()}... Mas Sans ignora e prepara o ataque!`;
                        setTimeout(() => startSansTurn(), 2000);
                    }
                }, 1500);
            }
        }

        /* ================= AÇÃO DE CURA (ITEM) ================= */
        function resolveItemAction() {
            gameState.phase = 'RESOLVING_ITEM';
            const healAmount = Math.floor(Math.random() * 50) + 1;
            
            let audio = new Audio('Hud de ações/snd_heal_c.wav');
            audio.play().catch(()=>{});

            document.getElementById('battle-text').innerHTML = `
                * As Almas consomem um Item misterioso!<br>
                * O grupo recuperou <span class="heal-text">${healAmount} HP</span>!
            `;

            setTimeout(() => {
                startSansTurn();
            }, 2500);
        }

        /* ================= QUICK TIME EVENT (QTE) ================= */
        function startQTEPhase() {
            gameState.phase = 'QTE';
            document.getElementById('battle-text').style.display = 'none';
            const qteContainer = document.getElementById('qte-container');
            const qteBar = document.getElementById('qte-bar');
            
            qteContainer.style.display = 'flex';
            qteBar.classList.add('qte-animating');
            qteBar.style.left = '2%';

            document.querySelectorAll('.action-btn-sprite').forEach(btn => btn.disabled = true);
            qteContainer.onclick = triggerAttackStrike;
        }

        function triggerAttackStrike() {
            if (gameState.phase !== 'QTE') return;
            gameState.phase = 'RESOLVING_ATTACK';

            const qteBar = document.getElementById('qte-bar');
            const computedStyle = window.getComputedStyle(qteBar);
            qteBar.classList.remove('qte-animating');
            qteBar.style.left = computedStyle.left;
            qteBar.style.backgroundColor = 'yellow';

            setTimeout(() => {
                const sansSprite = document.getElementById('sans-battle-sprite');
                const missPopup = document.getElementById('miss-popup');

                sansSprite.classList.add('sans-dodging');
                missPopup.classList.add('show-miss');

                let audio = new Audio('Ataque/snd_hit.wav');
                audio.play().catch(()=>{});

                setTimeout(() => {
                    sansSprite.classList.remove('sans-dodging');
                    missPopup.classList.remove('show-miss');
                    startSansTurn();
                }, 1800);
            }, 400);
        }

        /* ================= TURNO DO SANS (CONTROLES GM + / -) ================= */
        function startSansTurn() {
            gameState.phase = 'SANS_TURN';
            gameState.sansTurnTimer = 10;
            
            document.getElementById('qte-container').style.display = 'none';
            document.getElementById('battle-text').style.display = 'block';

            if (playerState.role === 'sans') {
                document.getElementById('sans-gm-controls').style.display = 'flex';
            }

            updateSansTurnText();

            clearInterval(gameState.timerInterval);
            gameState.timerInterval = setInterval(() => {
                gameState.sansTurnTimer--;
                updateSansTurnText();

                if (gameState.sansTurnTimer <= 0) {
                    clearInterval(gameState.timerInterval);
                    endSansTurn();
                }
            }, 1000);
        }

        function adjustSansTime(seconds) {
            gameState.sansTurnTimer += seconds;
            if (gameState.sansTurnTimer < 1) gameState.sansTurnTimer = 1;
            updateSansTurnText();
        }

        function updateSansTurnText() {
            document.getElementById('battle-text').innerHTML = `
                * O TURNO DO SANS COMEÇOU!<br>
                * Gaster Blasters e ossos atacam a arena das Almas.<br>
                <span style="color: #00FFFF;">* TEMPO DE SOBREVIVÊNCIA RESTANTE: ${gameState.sansTurnTimer}s</span>
            `;
        }

        function endSansTurn() {
            document.getElementById('battle-text').innerHTML = `* O turno de ataque do Sans terminou.<br>* As Almas preparam seu contra-ataque...`;
            document.getElementById('sans-gm-controls').style.display = 'none';

            setTimeout(() => {
                startVotingPhase();
            }, 2000);
        }

        updateMenuState();
    </script>
</body>
</html>
