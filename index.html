<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undertale: Multiplayer Battle System V0.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #FFFFFF;
            --highlight-color: #FFFF00;
            --sans-blue: #00FFFF;
            --hp-green: #00FF00;
        }

        * {
            box-sizing: border-box;
            image-rendering: pixelated; /* Fiel ao Pixel Art */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Press Start 2P', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            overflow: hidden;
        }

        /* --- SANS SKIN CORRIGIDA --- */
        @keyframes sansHead {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-2px); }
        }
        @keyframes sansBody {
            0%, 100% { transform: translateY(0px) scaleY(1); }
            50% { transform: translateY(-3px) scaleY(1.02); }
        }
        @keyframes sansArms {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-2px); }
        }

        .sans-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto;
            transition: transform 0.3s;
        }

        .sans-dodging { transform: translateX(-150px) !important; }

        .sans-part { position: absolute; left: 50%; transform: translateX(-50%); }

        .sans-legs { bottom: 0; width: 50px; z-index: 1; }
        .sans-body { bottom: 20px; width: 66px; z-index: 3; animation: sansBody 3s infinite; }
        .sans-head { bottom: 58px; width: 50px; z-index: 4; animation: sansHead 3s infinite 0.1s; }
        .sans-arm-left { bottom: 25px; left: 20px; width: 22px; z-index: 2; animation: sansArms 3s infinite 0.2s; }
        .sans-arm-right { bottom: 25px; right: 20px; left: auto; width: 22px; z-index: 2; animation: sansArms 3s infinite 0.3s; }

        /* --- MENUS E INTERFACE --- */
        .menu-box {
            border: 4px solid white;
            padding: 20px;
            width: 600px;
            background-color: black;
            margin-top: 10px;
        }

        h1 { font-size: 14px; text-align: center; margin-bottom: 20px; }
        label { font-size: 10px; color: var(--highlight-color); display: block; margin-bottom: 5px; }
        .form-group { margin-bottom: 15px; }
        select, button {
            background-color: black; color: white; border: 2px solid white;
            font-family: 'Press Start 2P', monospace; font-size: 10px; padding: 10px; width: 100%;
            cursor: pointer;
        }
        select:focus, button:hover { border-color: var(--highlight-color); color: var(--highlight-color); }
        
        .btn-ready { font-size: 14px; padding: 15px; margin-top: 10px; }
        .btn-ready.ready-active { background-color: #008000; border-color: #00FF00; color: white; }

        /* --- BOTÕES DE AÇÃO --- */
        .battle-actions { display: flex; justify-content: space-between; gap: 10px; margin-top: 15px; width: 600px; }
        .action-btn-sprite { flex: 1; background: transparent; border: none; padding: 0; cursor: pointer; transition: transform 0.1s; }
        .action-btn-sprite img { width: 100%; height: auto; display: block; }
        .action-btn-sprite:hover img, .action-btn-sprite.selected img { transform: scale(1.05); }

        /* --- ARENA (O QUADRADO) E ALMA --- */
        #arena-container {
            display: none;
            width: 280px;
            height: 280px;
            border: 4px solid white;
            position: relative;
            background-color: black;
            margin: 20px auto;
            overflow: hidden;
        }

        #player-soul {
            position: absolute;
            width: 16px;
            height: 16px;
            z-index: 10;
        }

        /* Efeito de Gravidade Azul */
        .soul-blue { filter: hue-rotate(240deg) saturate(3) !important; }

        /* Alerta de Ataque ! */
        .warning-box {
            position: absolute;
            background-color: rgba(255, 0, 0, 0.4);
            border: 2px solid red;
            display: flex;
            align-items: center;
            justify-content: center;
            color: yellow;
            font-size: 24px;
            z-index: 5;
        }

        .bone-attack { position: absolute; width: 14px; height: 100px; z-index: 6; }
        
        .gaster-blaster { position: absolute; width: 60px; height: 60px; z-index: 7; transition: transform 0.2s; }
        .gaster-beam { position: absolute; background: white; box-shadow: 0 0 10px cyan; z-index: 6; }

        #sans-gm-controls { text-align: center; color: var(--sans-blue); font-size: 10px; margin-top: 10px; display: none; line-height: 1.5; }
    </style>
</head>
<body>

    <!-- LOBBY -->
    <div id="lobby-screen">
        <div class="sans-container">
            <img src="legs-normal.png" class="sans-part sans-legs">
            <img src="arm-left.png" class="sans-part sans-arm-left">
            <img src="arm-right.png" class="sans-part sans-arm-right">
            <img src="body-normal.png" class="sans-part sans-body">
            <img src="head-normal.png" class="sans-part sans-head">
        </div>

        <div class="menu-box">
            <h1>SISTEMA DE BATALHA</h1>
            <div class="form-group">
                <label>* ESCOLHA SEU SLOT</label>
                <select id="role-select" onchange="updateMenuState()">
                    <option value="sans">JOGADOR 1: SANS (GM)</option>
                    <option value="soul1" selected>JOGADOR 2: ALMA HUMANA</option>
                </select>
            </div>
            <div style="display:flex; justify-content: center; margin: 10px 0;">
                <img src="soul.png" id="soul-img" style="width:24px; height:24px;">
            </div>
            <button class="btn-ready" id="btn-ready" onclick="toggleReady()">APERTAR PRONTO</button>
        </div>
    </div>

    <!-- TELA DE BATALHA -->
    <div id="battle-screen" style="display: none; width: 600px;">
        <div class="sans-container" id="sans-battle-sprite">
            <img src="legs-normal.png" class="sans-part sans-legs">
            <img src="arm-left.png" class="sans-part sans-arm-left">
            <img src="arm-right.png" class="sans-part sans-arm-right">
            <img src="body-normal.png" class="sans-part sans-body">
            <img src="head-normal.png" class="sans-part sans-head">
        </div>

        <!-- CAIXA DE DIÁLOGO NORMAL -->
        <div class="menu-box" id="dialogue-box" style="height: 150px; display: flex; align-items: center;">
            <div style="font-size: 14px; line-height: 1.8;" id="battle-text">
                * Sans te observa.<br>* O que você vai fazer?
            </div>
        </div>

        <!-- ARENA DE ATAQUE (Substitui o Diálogo) -->
        <div id="arena-container">
            <img src="soul.png" id="player-soul">
        </div>

        <div id="sans-gm-controls">
            * GM SANS ATIVO<br>
            [W A S D]: Gravidade Azul | [W A S D Duplo]: Ataque de Ossos<br>
            [Q/E]: Trocar Arma (Atual: <span id="current-weapon" style="color:yellow">OSSOS</span>)<br>
            [S] (Modo Blaster): Atirar Gaster Blaster
        </div>

        <div class="battle-actions">
            <button class="action-btn-sprite" onclick="triggerQTE()">
                <img src="f0.png" id="img-LUTAR">
            </button>
            <button class="action-btn-sprite" onclick="triggerSansTurn()">
                <img src="All.png" id="img-AGIR">
            </button>
            <button class="action-btn-sprite" onclick="triggerSansTurn()">
                <img src="All.png" id="img-ITEM">
            </button>
            <button class="action-btn-sprite" onclick="triggerSansTurn()">
                <img src="All.png" id="img-POUPAR">
            </button>
        </div>
    </div>

    <script>
        let playerState = { role: 'soul1', isReady: false };
        let gameState = { phase: 'VOTING' };
        
        // FÍSICA DA ALMA
        let soul = { x: 132, y: 132, vx: 0, vy: 0, speed: 3.5, size: 16 };
        let gravity = { x: 0, y: 0 };
        let isBlue = false;
        let keys = {};

        // SANS GM
        let sansWeapon = 'BONES'; // 'BONES' ou 'BLASTERS'
        let lastKey = '';
        let lastKeyTime = 0;

        /* ================= SETUP ================= */
        function updateMenuState() {
            playerState.role = document.getElementById('role-select').value;
            if (playerState.isReady) toggleReady();
        }

        function toggleReady() {
            playerState.isReady = !playerState.isReady;
            const btn = document.getElementById('btn-ready');
            if (playerState.isReady) {
                btn.classList.add('ready-active');
                btn.innerText = "* PRONTO! INICIANDO...";
                setTimeout(() => {
                    document.getElementById('lobby-screen').style.display = 'none';
                    document.getElementById('battle-screen').style.display = 'flex';
                }, 800);
            } else {
                btn.classList.remove('ready-active');
                btn.innerText = "APERTAR PRONTO";
            }
        }

        /* ================= INPUT DO TECLADO ================= */
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            if (gameState.phase === 'SANS_TURN' && playerState.role === 'sans') {
                let k = e.key.toLowerCase();
                
                // Troca de arma
                if (k === 'q' || k === 'e') {
                    sansWeapon = (sansWeapon === 'BONES') ? 'BLASTERS' : 'BONES';
                    document.getElementById('current-weapon').innerText = sansWeapon === 'BONES' ? 'OSSOS' : 'BLASTERS';
                    return;
                }

                // Ataque Blaster
                if (sansWeapon === 'BLASTERS' && k === 's') {
                    spawnGasterBlaster();
                    return;
                }

                // Gravidade e Ossos
                if (['w','a','s','d'].includes(k) && sansWeapon === 'BONES') {
                    let now = Date.now();
                    if (lastKey === k && now - lastKeyTime < 300) {
                        spawnBoneAttack(k); // Duplo clique = Ossos
                        lastKey = '';
                    } else {
                        slamSoul(k); // Um clique = Gravidade Azul
                        lastKey = k;
                        lastKeyTime = now;
                    }
                }
            }
        });

        window.addEventListener('keyup', (e) => { keys[e.key] = false; });

        /* ================= LOOP DA ARENA (REQUEST ANIMATION FRAME) ================= */
        function updateArena() {
            if (gameState.phase !== 'SANS_TURN') return;

            // Movimentação do Jogador (Alma)
            if (playerState.role !== 'sans') {
                if (!isBlue) { // Vermelho: movimento livre 4 direções
                    if (keys['ArrowUp']) soul.y -= soul.speed;
                    if (keys['ArrowDown']) soul.y += soul.speed;
                    if (keys['ArrowLeft']) soul.x -= soul.speed;
                    if (keys['ArrowRight']) soul.x += soul.speed;
                } else { // Azul: sofre gravidade e só pode pular
                    soul.vx += gravity.x;
                    soul.vy += gravity.y;
                    
                    // Pulo simples oposto à gravidade
                    if (keys['ArrowUp'] && gravity.y > 0 && soul.y >= 260) soul.vy = -10; 
                    if (keys['ArrowDown'] && gravity.y < 0 && soul.y <= 0) soul.vy = 10;
                    if (keys['ArrowLeft'] && gravity.x > 0 && soul.x >= 260) soul.vx = -10;
                    if (keys['ArrowRight'] && gravity.x < 0 && soul.x <= 0) soul.vx = 10;

                    // Movimento lateral na gravidade azul
                    if (gravity.y !== 0) {
                        if (keys['ArrowLeft']) soul.x -= soul.speed;
                        if (keys['ArrowRight']) soul.x += soul.speed;
                    } else if (gravity.x !== 0) {
                        if (keys['ArrowUp']) soul.y -= soul.speed;
                        if (keys['ArrowDown']) soul.y += soul.speed;
                    }
                }
            }

            // Aplica velocidades e atrito
            if (isBlue) {
                soul.x += soul.vx;
                soul.y += soul.vy;
            }

            // Colisões com as paredes da Arena (280x280)
            if (soul.x < 0) { soul.x = 0; soul.vx = 0; }
            if (soul.y < 0) { soul.y = 0; soul.vy = 0; }
            if (soul.x > 280 - soul.size) { soul.x = 280 - soul.size; soul.vx = 0; }
            if (soul.y > 280 - soul.size) { soul.y = 280 - soul.size; soul.vy = 0; }

            let soulEl = document.getElementById('player-soul');
            soulEl.style.left = soul.x + 'px';
            soulEl.style.top = soul.y + 'px';

            requestAnimationFrame(updateArena);
        }

        /* ================= HABILIDADES DO SANS ================= */
        function slamSoul(dir) {
            isBlue = true;
            document.getElementById('player-soul').classList.add('soul-blue');
            gravity = {x:0, y:0};
            soul.vx = 0; soul.vy = 0;
            let slamForce = 15;

            if (dir === 'w') { gravity.y = -1; soul.vy = -slamForce; }
            if (dir === 's') { gravity.y = 1; soul.vy = slamForce; }
            if (dir === 'a') { gravity.x = -1; soul.vx = -slamForce; }
            if (dir === 'd') { gravity.x = 1; soul.vx = slamForce; }
        }

        function spawnBoneAttack(dir) {
            let arena = document.getElementById('arena-container');
            let warn = document.createElement('div');
            warn.className = 'warning-box';
            warn.innerText = '!';
            
            let bone = document.createElement('img');
            bone.src = 'BoneOutline.png';
            bone.className = 'bone-attack';

            if (dir === 's') { warn.style.bottom = '0'; warn.style.width = '100%'; warn.style.height = '40px'; bone.style.bottom = '-100px'; bone.style.left = '130px'; }
            if (dir === 'w') { warn.style.top = '0'; warn.style.width = '100%'; warn.style.height = '40px'; bone.style.top = '-100px'; bone.style.left = '130px'; }
            if (dir === 'a') { warn.style.left = '0'; warn.style.width = '40px'; warn.style.height = '100%'; bone.style.left = '-100px'; bone.style.top = '90px'; bone.style.transform = 'rotate(90deg)';}
            if (dir === 'd') { warn.style.right = '0'; warn.style.width = '40px'; warn.style.height = '100%'; bone.style.right = '-100px'; bone.style.top = '90px'; bone.style.transform = 'rotate(90deg)';}

            arena.appendChild(warn);
            
            setTimeout(() => {
                warn.remove();
                arena.appendChild(bone);
                let moveInterval = setInterval(() => {
                    if (dir === 's') bone.style.bottom = (parseInt(bone.style.bottom || 0) + 15) + 'px';
                    if (dir === 'w') bone.style.top = (parseInt(bone.style.top || 0) + 15) + 'px';
                    if (dir === 'a') bone.style.left = (parseInt(bone.style.left || 0) + 15) + 'px';
                    if (dir === 'd') bone.style.right = (parseInt(bone.style.right || 0) + 15) + 'px';
                }, 30);
                setTimeout(() => { clearInterval(moveInterval); bone.remove(); }, 1000);
            }, 500);
        }

        function spawnGasterBlaster() {
            let arena = document.getElementById('arena-container');
            let blaster = document.createElement('img');
            blaster.className = 'gaster-blaster';
            
            // Posição Aleatória Fora da Arena
            let side = Math.floor(Math.random() * 4);
            let tx = soul.x, ty = soul.y; // Mira onde a alma está
            let bx, by, angle;

            if (side===0) { bx = tx; by = -80; angle = 180; } // Topo
            else if (side===1) { bx = tx; by = 300; angle = 0; } // Fundo
            else if (side===2) { bx = -80; by = ty; angle = 90; } // Esquerda
            else { bx = 300; by = ty; angle = -90; } // Direita

            blaster.style.left = bx + 'px';
            blaster.style.top = by + 'px';
            blaster.style.transform = `rotate(${angle}deg)`;
            arena.appendChild(blaster);

            // Animação 1 ao 5
            let frame = 1;
            let anim = setInterval(() => {
                blaster.src = `Gaster blaster ${frame}.png`;
                frame++;
                if(frame > 5) {
                    clearInterval(anim);
                    // Dispara o raio
                    let beam = document.createElement('div');
                    beam.className = 'gaster-beam';
                    if(side===0 || side===1) { beam.style.width = '30px'; beam.style.height = '400px'; beam.style.left = (bx+15)+'px'; beam.style.top = '-50px'; }
                    else { beam.style.width = '400px'; beam.style.height = '30px'; beam.style.top = (by+15)+'px'; beam.style.left = '-50px'; }
                    arena.appendChild(beam);
                    
                    setTimeout(() => { beam.remove(); blaster.remove(); }, 400);
                }
            }, 80);
        }

        /* ================= TRANSIÇÕES DE TURNO ================= */
        function triggerQTE() {
            document.getElementById('img-LUTAR').src = 'f1.png';
            setTimeout(() => {
                document.getElementById('img-LUTAR').src = 'f0.png';
                document.getElementById('sans-battle-sprite').classList.add('sans-dodging');
                setTimeout(() => {
                    document.getElementById('sans-battle-sprite').classList.remove('sans-dodging');
                    triggerSansTurn();
                }, 1000);
            }, 500);
        }

        function triggerSansTurn() {
            gameState.phase = 'SANS_TURN';
            document.getElementById('dialogue-box').style.display = 'none';
            document.getElementById('arena-container').style.display = 'block';
            
            // Centraliza a alma
            soul.x = 132; soul.y = 132; 
            isBlue = false;
            document.getElementById('player-soul').classList.remove('soul-blue');

            if (playerState.role === 'sans') {
                document.getElementById('sans-gm-controls').style.display = 'block';
            }

            requestAnimationFrame(updateArena);

            // Turno dura 10 segundos para testar
            setTimeout(() => {
                gameState.phase = 'VOTING';
                document.getElementById('arena-container').style.display = 'none';
                document.getElementById('sans-gm-controls').style.display = 'none';
                document.getElementById('dialogue-box').style.display = 'flex';
                document.getElementById('battle-text').innerHTML = "* O turno acabou. O que você vai fazer?";
            }, 10000);
        }
    </script>
</body>
</html>
